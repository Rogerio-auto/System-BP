# =============================================================================
# docker-stack.prod.yml — Stack de produção do Elemento (Docker Swarm / Portainer).
#
# Serviços: api (Node/Fastify), web (SPA nginx), langgraph (Python) + camada de
#   background: outbox / livechat / workers (supervisor por WORKER_GROUP).
#
# Rede: `elemento_net` é uma overlay ATTACHABLE EXTERNA (criada fora do stack) e
#   COMPARTILHADA com a stack de dados `elemento-data` (Postgres/Redis/RabbitMQ).
#   Pré-requisito do deploy:
#     docker network create -d overlay --attachable elemento_net
#   Os serviços alcançam o banco/redis/rmq pelos NOMES de container na overlay
#   (elemento_pg / elemento_redis / elemento_rmq) — via DATABASE_URL/REDIS_URL/
#   RABBITMQ_URL nos secrets.
#
# Ingress: NÃO publica portas no host. O Nginx Proxy Manager (na mesma overlay)
#   roteia os domínios com SSL:
#     app.bancodopovoderondonia.org.br → web:8080
#     api.bancodopovoderondonia.org.br → api:3333
#   (firewall: só 22/80/443 públicos).
#
# Segredos: NÃO ficam aqui. Injetados por ${VAR} no deploy:
#   set -a; . /root/elemento-secrets/api.env; . /root/elemento-secrets/langgraph.env; set +a
#   docker stack deploy -c docker-stack.prod.yml elemento --with-registry-auth
#
# Build do web embute VITE_API_URL em build-time:
#   docker build -f apps/web/Dockerfile --build-arg VITE_API_URL=https://api.bancodopovoderondonia.org.br -t elemento-web:prod .
# =============================================================================
version: '3.9'

services:
  api:
    image: elemento-api:prod
    environment: &app_env
      NODE_ENV: production
      LOG_LEVEL: info
      API_HOST: 0.0.0.0
      API_PORT: '3333'
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      LANGGRAPH_INTERNAL_TOKEN: ${LANGGRAPH_INTERNAL_TOKEN}
      LANGGRAPH_SERVICE_URL: http://langgraph:8000
      LGPD_DATA_KEY: ${LGPD_DATA_KEY}
      LGPD_DEDUPE_PEPPER: ${LGPD_DEDUPE_PEPPER}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      META_WHATSAPP_ACCESS_TOKEN: ${META_WHATSAPP_ACCESS_TOKEN}
      META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID}
      META_WABA_ID: ${META_WABA_ID}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_WEBHOOK_HMAC_SECRET: ${CHATWOOT_WEBHOOK_HMAC_SECRET}
      FX_BRL_PER_USD: ${FX_BRL_PER_USD}
      # Storage de mídia do live chat (Supabase Storage — LGPD in-country)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      SUPABASE_STORAGE_URL: ${SUPABASE_STORAGE_URL}
      SUPABASE_STORAGE_PUBLIC_URL: ${SUPABASE_STORAGE_PUBLIC_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}
    networks:
      - elemento_net
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 640M

  langgraph:
    image: elemento-langgraph:prod
    environment:
      LOG_LEVEL: INFO
      BACKEND_INTERNAL_URL: http://api:3333
      LANGGRAPH_INTERNAL_TOKEN: ${LANGGRAPH_INTERNAL_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL_CLASSIFIER: ${LLM_MODEL_CLASSIFIER}
      LLM_MODEL_REASONER: ${LLM_MODEL_REASONER}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK}
      LLM_DAILY_BUDGET_USD: ${LLM_DAILY_BUDGET_USD}
    networks:
      - elemento_net
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 640M

  web:
    image: elemento-web:prod
    networks:
      - elemento_net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 96M

  # --- Camada de background: workers via supervisor (1 grupo por serviço) ---
  # Cada serviço roda `node dist/workers/supervisor.js` com WORKER_GROUP diferente.
  # Reusa o env do api (âncora *app_env). Alcança Postgres/Redis/RabbitMQ pelos
  # nomes de container na overlay elemento_net (elemento_pg / elemento_redis / elemento_rmq).
  outbox:
    image: elemento-api:prod
    command: ['node', 'dist/workers/supervisor.js']
    environment:
      <<: *app_env
      WORKER_GROUP: outbox
    networks:
      - elemento_net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

  livechat:
    image: elemento-api:prod
    command: ['node', 'dist/workers/supervisor.js']
    environment:
      <<: *app_env
      WORKER_GROUP: livechat
    networks:
      - elemento_net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 384M

  workers:
    image: elemento-api:prod
    command: ['node', 'dist/workers/supervisor.js']
    environment:
      <<: *app_env
      WORKER_GROUP: periodic
    networks:
      - elemento_net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

networks:
  elemento_net:
    external: true
