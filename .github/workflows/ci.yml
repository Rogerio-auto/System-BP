name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.18.3
  PNPM_VERSION: 9.12.0
  PYTHON_VERSION: 3.12

jobs:
  node:
    name: Node — lint, typecheck, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: elemento
          POSTGRES_PASSWORD: elemento
          POSTGRES_DB: elemento_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U elemento"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://elemento:elemento@localhost:5432/elemento_test
      JWT_ACCESS_SECRET: ci-access-secret-please-rotate-this-is-only-for-tests-xxxxxx
      JWT_REFRESH_SECRET: ci-refresh-secret-please-rotate-this-is-only-for-tests-xxxxx
      API_PUBLIC_URL: http://localhost:3333
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      LANGGRAPH_INTERNAL_TOKEN: ci-internal-token-rotate-regularly-32chars
      LANGGRAPH_SERVICE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # docs-prebuild: generate API docs before web:build (F10-S11)
      # continue-on-error because these scripts need a live API; in CI the API
      # is not serving HTTP — the scripts use app.inject() internally.
      # If they fail (e.g. env mismatch), the build continues with empty generated files.
      - name: Generate schema-examples.json
        run: pnpm --filter @elemento/api openapi:examples
        continue-on-error: true
      - name: Pre-render OpenAPI spec
        run: pnpm --filter @elemento/web docs:openapi
        continue-on-error: true
      - name: Generate MDX API pages
        run: pnpm --filter @elemento/web docs:api
        continue-on-error: true
      - name: Run migrations (test DB)
        # db:migrate roda FORA do vitest, então o globalSetup (src/test/setup.ts) não
        # injeta env. Fornecemos aqui os mesmos valores de teste que o setup usa, para
        # passar a validação do env.ts. DATABASE_URL herda do env do job (elemento_test).
        env:
          JWT_ACCESS_SECRET: test-access-secret-used-only-in-vitest-do-not-use-in-production-00000000
          JWT_REFRESH_SECRET: test-refresh-secret-used-only-in-vitest-do-not-use-in-production-0000000
          WHATSAPP_APP_SECRET: test-whatsapp-app-secret-vitest-only
          WHATSAPP_VERIFY_TOKEN: test-verify-token-vitest
          CHATWOOT_WEBHOOK_HMAC_SECRET: test-chatwoot-hmac-secret-vitest
          LGPD_DATA_KEY: P5Uc4j/vdAisFljJ0kdz08PLWmPvMC/NX5VIy99Bv+E=
          LGPD_DEDUPE_PEPPER: xgRqlH8Ag8bV/DI9gza3qIFx0w4RF3f9ZF/RSilyV2s=
          FX_BRL_PER_USD: '5.75'
        run: pnpm --filter @elemento/api db:migrate
      - name: Reports integration tests (real DB)
        # Roda os testes de integração de reports DIRETO no vitest (sem turbo, que filtra
        # env vars). DATABASE_URL herda do job (elemento_test, já migrado no passo acima);
        # o globalSetup (setup.ts) preserva via ??= e injeta o resto do env de teste.
        run: pnpm --filter @elemento/api exec vitest run reports.integration
      - run: pnpm turbo run lint typecheck test build

  python:
    name: Python — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/langgraph-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest -q
