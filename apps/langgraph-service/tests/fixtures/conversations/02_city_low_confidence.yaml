  get_or_create_lead:
    status: 200
    body:
      ok: true
      lead_id: 'lead-fixture-002'
      customer_id: 'cust-fixture-002'
      created: false
      current_stage: 'qualificacao'
      city_id: null

  identify_city:
    status: 200
    body:
      city_id: null
      city_name: 'Porto Velho'
      matched: false
      confidence: 0.60
      out_of_service: false
      alternatives:
        - city_id: 'city-fixture-pv'
          city_name: 'Porto Velho'
          confidence: 0.60
        - city_id: 'city-fixture-pf'
          city_name: 'Pimenta Bueno'
          confidence: 0.45

  persist_state:
    status: 200
    body: {}

  log_ai_decision:
    status: 200
    body:
      decision_log_id: 'log-fixture-002'

assertions:
  handoff_required: false
  city_id_null: true
  # A mensagem de confirmação deve ter sido inserida em messages
  messages_contain_confirmation: true
  last_simulation_id_present: false
