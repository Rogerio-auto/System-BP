# Fixture 02 — Cidade incerta → confirmação do cliente
# Cenário: cliente informa cidade com confiança < 0.85 → grafo pergunta confirmação

id: conv-fixture-002
description: >
  Cidade com baixa confiança (confidence 0.60): o nó identify_city insere mensagem
  de confirmação com alternativas em messages e roteia para send_response.
  Nenhum handoff humano. city_id permanece null no estado final do turno.

initial_state:
  conversation_id: 'conv-fixture-002'
  chatwoot_conversation_id: 'cw-fixture-002'
  phone: '+5569900010002'
  handoff_required: false
  handoff_reason: null
  missing_fields: []
  messages:
    - role: 'user'
      content: 'Quero crédito'
    - role: 'assistant'
      content: 'Olá! Com prazer. Em qual cidade você está?'
    - role: 'user'
      content: 'Porto'
  tool_results: []
  errors: []
  actions_emitted: []
  lead_id: 'lead-fixture-002'
  customer_id: 'cust-fixture-002'
  customer_name: 'Carlos Teste'
  city_id: null
  city_name: null
  current_intent: null
  requested_amount: null
  requested_term_months: null
  selected_product_id: null
  last_simulation_id: null
  current_stage: 'qualificacao'

llm_mocks:
  classify_intent: 'quer_credito'

backend_mocks:
  load_state:
    status: 200
    body:
      state:
        conversation_id: 'conv-fixture-002'
        chatwoot_conversation_id: 'cw-fixture-002'
        phone: '+5569900010002'
        handoff_required: false
        handoff_reason: null
        missing_fields: []
        messages:
          - role: 'user'
            content: 'Quero crédito'
          - role: 'assistant'
            content: 'Olá! Com prazer. Em qual cidade você está?'
          - role: 'user'
            content: 'Porto'
        tool_results: []
        errors: []
        actions_emitted: []
        lead_id: 'lead-fixture-002'
        customer_id: 'cust-fixture-002'
        customer_name: 'Carlos Teste'
        city_id: null
        city_name: null
        current_intent: null
        requested_amount: null
        requested_term_months: null
        selected_product_id: null
        last_simulation_id: null
