# Fixture 05 — Cidade fora de área atendida (out_of_service)
# Cenário: backend retorna matched=false, out_of_service=true → mensagem amigável,
# sem handoff humano, sem simulação.

id: conv-fixture-005
description: >
  Cliente informa cidade não atendida pelo Banco do Povo. O backend retorna
  out_of_service=true para identify_city. O nó insere mensagem de fluxo
  alternativo e city_id permanece null. Sem handoff humano.
  handoff_required=False no estado final (encerramento amigável, não escalada).

initial_state:
  conversation_id: 'conv-fixture-005'
  chatwoot_conversation_id: 'cw-fixture-005'
  phone: '+5569900010005'
  handoff_required: false
  handoff_reason: null
  missing_fields: []
  messages:
    - role: 'user'
      content: 'Oi quero um empréstimo'
    - role: 'assistant'
      content: 'Olá! Em qual cidade você está?'
    - role: 'user'
      content: 'Manaus'
  tool_results: []
  errors: []
  actions_emitted: []
  lead_id: 'lead-fixture-005'
  customer_id: 'cust-fixture-005'
  customer_name: 'Lucia Ficticia'
  city_id: null
  city_name: null
  current_intent: null
  requested_amount: null
  requested_term_months: null
  selected_product_id: null
  last_simulation_id: null
  current_stage: 'qualificacao'

llm_mocks:
  classify_intent: 'quer_credito'

backend_mocks:
  load_state:
    status: 404

  get_or_create_lead:
    status: 200
    body:
      ok: true
      lead_id: 'lead-fixture-005'
      customer_id: 'cust-fixture-005'
      created: false
      current_stage: 'qualificacao'
      city_id: null

  identify_city:
    status: 200
    body:
      city_id: null
      city_name: 'Manaus'
      matched: false
      confidence: 0.0
      out_of_service: true
      alternatives: []

  persist_state:
    status: 200
    body: {}

  log_ai_decision:
    status: 200
    body:
      decision_log_id: 'log-fixture-005'

assertions:
  handoff_required: false
  city_id_null: true
  last_simulation_id_present: false
  # Mensagem de out_of_service deve estar em messages
  messages_contain_out_of_service: true
