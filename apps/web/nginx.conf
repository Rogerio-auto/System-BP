# map para upgrade de websocket (socket.io). Fora do server{} (nível http via conf.d).
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # DNS interno do Docker — resolve o serviço da API (overlay) em runtime.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # microphone=(self): habilita gravacao de audio no live chat (mesma origem).
  # Sem isso o navegador bloqueia getUserMedia antes do popup de permissao.
  add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

  # API same-origin: /api -> serviço da API. Elimina cookies cross-subdomínio
  # (app.* e api.* deixam de divergir) — corrige o logout em todo reload.
  location /api/ {
    set $api_up http://elemento_api:3333;
    proxy_pass $api_up$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 60m;
    proxy_read_timeout 120s;
  }

  # Socket.io (live chat realtime) -> API, com upgrade de websocket.
  location /socket.io/ {
    set $api_up http://elemento_api:3333;
    proxy_pass $api_up$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # Cache de assets imutáveis
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
