    <!--
      Ícones (F27-S02, doc 24 §3.3): gerados por `@vite-pwa/assets-generator`
      a partir da arte-fonte única `public/pwa-source.svg` (identidade do DS
      v2 — ver comentário no próprio SVG). Regenerar com
      `pnpm --filter @elemento/web generate-pwa-assets`; NÃO editar os PNGs
      à mão. `pwa-192x192.png`/`pwa-512x512.png`/`pwa-maskable-512x512.png`
      são consumidos pelo manifesto (F27-S01, `vite.config.ts`) — não
      renomear sem atualizar os dois lugares.
    -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/pwa-source.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <!--
      PWA (F27-S01, doc 24 §3.2): theme-color com variante light/dark usando
      tokens do DS v2 (--brand-azul) — cor da bandeira de Rondônia como
      identidade do app instalado. `<link rel=manifest>` é injetado pelo
      vite-plugin-pwa em build time.
    -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#1B3A8C" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#5E80E0" />

      rel="stylesheet"
    />

    <!--
      Anti-flash script: roda inline antes do React montar.
      Lê localStorage.theme → senão prefers-color-scheme → senão "light".
      Aplica data-theme no <html> E classe (dark/light) para Tailwind.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme =
          stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
      })();
    </script>
